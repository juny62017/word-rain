<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Rain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <header class="game-header">
      <div>
        <h1>WORD RAIN</h1>
        <p>Type the falling words before they reach the ground.</p>
      </div>

      <span class="build-label">ENDLESS TYPING GAME</span>
    </header>

    <canvas id="gameCanvas" width="900" height="560">
      Your browser does not support the canvas element.
    </canvas>

    <footer class="game-footer">
      <span>ENTER: START / RESTART</span>
      <span>ESC: RELEASE WORD</span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
